<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Galeria de Vídeos e Áudios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background:
        radial-gradient(900px 500px at 12% 8%, rgba(124,92,255,.20), transparent 55%),
        radial-gradient(800px 500px at 88% 18%, rgba(25,211,255,.18), transparent 55%),
        radial-gradient(900px 600px at 50% 95%, rgba(255,193,7,.12), transparent 55%),
        #f4f4f9;
    }

    h1 { text-align: center; color: #333; margin-bottom: 10px; }
 .brand { display:flex; justify-content:center; margin: 10px 0 0; }    
 
 .brand video {
  width: 20%;          /* reduz a largura em 80% */
  height: auto;        /* mantém proporção*/
  object-fit: cover;   /* garante que o vídeo se ajuste sem distorcer */
  border-radius: 8px;  /* opcional: cantos arredondados */
  display: block;      /* remove espaços extras */
  margin: 0 auto;      /* centraliza o vídeo no cabeçalho */
}
    form {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="file"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }

    #search, #sort {
      margin: 14px auto;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 18px;
    }

/* Ajuste do tamanho das thumbnais para celulares */
.card {
  width: 240px;
  background: rgba(255,255,255,0.9);
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  text-align: center;
}

/* Ajuste para telas menores (celulares) */
@media (max-width: 768px) {
  .card {
    width: 90%;        /* ocupa quase toda a largura da tela */
    max-width: 400px;  /* limite para não ficar exagerado */
  }

  .card img {
    width: 100%;       /* thumbnail ocupa toda a largura do card */
    height: auto;      /* mantém proporção */
  }
}

  .card audio { width: 100%; margin-top: 10px; }
    
    .delete { background: #dc3545; margin-top: 5px; }
    .edit { background: #ffc107; color: black; margin-top: 5px; }
    .muted { color:#555; font-size: 12px; text-align:center; }
    .section-title { text-align: center; margin-top: 30px; }
  </style>
</head>

<body>

<header>
  <div class="brand">
    <video 
      src="cabecalho.mp4" 
      autoplay 
      muted 
      loop 
      playsinline 
      disablePictureInPicture 
      controlsList="nodownload nofullscreen noremoteplayback"
      style="width:20%; height:auto; display:block; margin:0 auto; object-fit:cover; border-radius:8px;">
    </video>
  </div>
</header>
  <form id="addForm">
    <input type="text" id="videoUrl" placeholder="Cole o link do YouTube aqui">
    <button type="submit">Adicionar Vídeo</button>
  </form>

  <form id="addAudioForm">
    <input type="text" id="audioTitle" placeholder="Título do áudio">
    <input type="file" id="audioFile" accept="audio/mpeg" multiple>
    <button type="submit">Adicionar MP3</button>
  </form>

  <div id="search">
    <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="renderAll()">
    <button onclick="sortByDate()">Ordenar por Data</button>
  </div>

  <div id="io" style="text-align:center; margin-bottom: 20px;">
    <button onclick="exportJSON()">Exportar JSON</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
    <button onclick="document.getElementById('importFile').click()">Importar JSON</button>
    <button class="delete" onclick="clearAll()">Limpar Tudo</button>
  </div>

  <h2 class="section-title">Vídeos</h2>
  <div id="videoList" class="list"></div>

  <h2 class="section-title">Áudios</h2>
  <div id="audioList" class="list"></div>

  <script>
    const VIDEOS_KEY = 'videos_db';
    const AUDIOS_META_KEY = 'audios_meta_db';
    
    let videos = JSON.parse(localStorage.getItem(VIDEOS_KEY)) || [];
    let audiosMeta = JSON.parse(localStorage.getItem(AUDIOS_META_KEY)) || [];

    // === INDEXED DB SETUP ===
    const DB_NAME = 'MediaDB';
    const STORE_NAME = 'audios';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
      });
    }

    // === FUNCTIONS ===
    function getYouTubeId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    async function saveAudioFile(id, file) {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(file, id);
    }

    async function getAudioFile(id) {
      const db = await openDB();
      return new Promise(resolve => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get(id);
        req.onsuccess = () => resolve(req.result);
      });
    }

function renderAll() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  
/* 
 // Render Vídeos
  const vList = document.getElementById('videoList');
  vList.innerHTML = '';
  videos.filter(v => v.title.toLowerCase().includes(term)).forEach((v, i) => {
    vList.innerHTML += `
      <div class="card">
        <a href="${v.url}" target="_blank">
          <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="Thumbnail do vídeo ${v.title}">
        </a>
        <p><strong>${v.title}</strong></p>
        <button class="delete" onclick="deleteVideo(${i})">Excluir</button>
      </div>`;
  });
*/

//FUNÇAO EDITAR TÍTULOS DOS VIDEOS

// Render Vídeos
const vList = document.getElementById('videoList');
vList.innerHTML = '';
videos.filter(v => v.title.toLowerCase().includes(term)).forEach((v, i) => {
  vList.innerHTML += `
    <div class="card">
      <a href="${v.url}" target="_blank">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="Thumbnail do vídeo ${v.title}">
      </a>
      <p><strong id="title-${i}">${v.title}</strong></p>
      <button class="edit" onclick="editVideoTitle(${i})">Editar Título</button>
      <button class="delete" onclick="deleteVideo(${i})">Excluir</button>
    </div>`;
});

  // Render Áudios
  const aList = document.getElementById('audioList');
  aList.innerHTML = '';
  audiosMeta.filter(a => a.title.toLowerCase().includes(term)).forEach(async (a) => {
    const blob = await getAudioFile(a.id);
    const url = blob ? URL.createObjectURL(blob) : '#';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p><strong>${a.title}</strong></p>
      <audio controls src="${url}"></audio>
      <p class="muted">${(a.size/1024/1024).toFixed(2)} MB</p>
      <button class="delete" onclick="deleteAudio('${a.id}')">Excluir</button>
    `;
    aList.appendChild(card);
  });
}

    // === EVENTS ===
    document.getElementById('addForm').onsubmit = e => {
      e.preventDefault();
      const url = document.getElementById('videoUrl').value;
      const id = getYouTubeId(url);
      if(!id) return alert('Link inválido');
      videos.push({ id, url, title: 'Vídeo ' + (videos.length + 1), date: Date.now() });
      localStorage.setItem(VIDEOS_KEY, JSON.stringify(videos));
      renderAll();
      e.target.reset();
    };

    document.getElementById('addAudioForm').onsubmit = async e => {
      e.preventDefault();
      const files = document.getElementById('audioFile').files;
      const titleBase = document.getElementById('audioTitle').value;

      for(let file of files) {
        const id = crypto.randomUUID();
        await saveAudioFile(id, file);
        audiosMeta.push({ 
          id, 
          title: titleBase || file.name, 
          size: file.size, 
          date: Date.now() 
        });
      }
      localStorage.setItem(AUDIOS_META_KEY, JSON.stringify(audiosMeta));
      renderAll();
      e.target.reset();
    };

    function deleteVideo(i) {
      videos.splice(i, 1);
      localStorage.setItem(VIDEOS_KEY, JSON.stringify(videos));
      renderAll();
    }

    async function deleteAudio(id) {
      const db = await openDB();
      db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).delete(id);
      audiosMeta = audiosMeta.filter(a => a.id !== id);
      localStorage.setItem(AUDIOS_META_KEY, JSON.stringify(audiosMeta));
      renderAll();
    }

    function exportJSON() {
      const data = JSON.stringify({ videos, audiosMeta });
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'backup_galeria.json';
      a.click();
    }

    function importJSON(event) {
      const reader = new FileReader();
      reader.onload = e => {
        const data = JSON.parse(e.target.result);
        videos = data.videos || [];
        audiosMeta = data.audiosMeta || [];
        localStorage.setItem(VIDEOS_KEY, JSON.stringify(videos));
        localStorage.setItem(AUDIOS_META_KEY, JSON.stringify(audiosMeta));
        renderAll();
      };
      reader.readAsText(event.target.files[0]);
    }

    function clearAll() {
      if(confirm('Limpar tudo?')) {
        localStorage.clear();
        openDB().then(db => {
          db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).clear();
          location.reload();
        });
      }
    }
//EDITAR TÍTULO

function editVideoTitle(index) {
  const novoTitulo = prompt("Digite o novo título para o vídeo:", videos[index].title);
  if (novoTitulo && novoTitulo.trim() !== "") {
    videos[index].title = novoTitulo.trim();
    localStorage.setItem(VIDEOS_KEY, JSON.stringify(videos));
    renderAll();
  }
}
 
function sortByDate() {
      videos.sort((a,b) => b.date - a.date);
      audiosMeta.sort((a,b) => b.date - a.date);
      renderAll();
    }

    // Init
    renderAll();
  </script>
</body>
</html>
